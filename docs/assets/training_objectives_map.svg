<svg xmlns="http://www.w3.org/2000/svg" width="1480" height="860" viewBox="0 0 1480 860" role="img" aria-labelledby="title desc">
  <title id="title">Unified map of language model training objectives</title>
  <desc id="desc">Comparison of SFT, DPO, PPO, GRPO and Agent RL by data, weighting signal, optimized tokens and objective.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#f8f3e9"/><stop offset="1" stop-color="#e1ede6"/></linearGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="5" stdDeviation="7" flood-color="#183c32" flood-opacity=".12"/></filter>
  </defs>
  <rect width="1480" height="860" rx="26" fill="url(#bg)"/>
  <text x="60" y="58" font-family="Georgia,serif" font-size="31" font-weight="700" fill="#17332b">One model, five ways to weight token log-probability</text>
  <text x="60" y="91" font-family="Arial,sans-serif" font-size="16" fill="#5c6d66">All methods update log πθ(token | context); they differ in where the weight comes from.</text>

  <g font-family="Arial,sans-serif" font-size="15" font-weight="700" fill="#f9f4e9">
    <rect x="55" y="125" width="1370" height="55" rx="13" fill="#183c32"/>
    <text x="135" y="159">Method</text><text x="340" y="159">Data unit</text><text x="650" y="159">Token weight</text><text x="955" y="159">Optimized tokens</text><text x="1220" y="159">Main risk</text>
  </g>

  <g filter="url(#shadow)" font-family="Arial,sans-serif">
    <g transform="translate(55 205)"><rect width="1370" height="105" rx="16" fill="#fffaf0"/><rect width="165" height="105" rx="16" fill="#c76d3b"/><text x="82" y="61" text-anchor="middle" font-size="24" font-weight="700" fill="#fff">SFT</text><text x="205" y="43" font-size="17" font-weight="700" fill="#283f37">(x, demonstrated y)</text><text x="205" y="72" font-size="14" fill="#607069">conversation example</text><text x="520" y="43" font-size="17" font-weight="700" fill="#283f37">1 on assistant, 0 elsewhere</text><text x="520" y="72" font-size="14" fill="#607069">cross-entropy mask</text><text x="835" y="56" font-size="16" fill="#283f37">assistant response</text><text x="1110" y="43" font-size="16" fill="#283f37">imitation / overfit</text><text x="1110" y="72" font-size="14" fill="#607069">prompt truncation</text></g>
    <g transform="translate(55 330)"><rect width="1370" height="105" rx="16" fill="#fffaf0"/><rect width="165" height="105" rx="16" fill="#d99b45"/><text x="82" y="61" text-anchor="middle" font-size="24" font-weight="700" fill="#fff">DPO</text><text x="205" y="43" font-size="17" font-weight="700" fill="#283f37">(x, chosen, rejected)</text><text x="205" y="72" font-size="14" fill="#607069">paired preference</text><text x="520" y="43" font-size="17" font-weight="700" fill="#283f37">relative log-ratio</text><text x="520" y="72" font-size="14" fill="#607069">policy minus reference</text><text x="835" y="56" font-size="16" fill="#283f37">both answers</text><text x="1110" y="43" font-size="16" fill="#283f37">alignment tax</text><text x="1110" y="72" font-size="14" fill="#607069">pair truncation</text></g>
    <g transform="translate(55 455)"><rect width="1370" height="105" rx="16" fill="#f4faf6"/><rect width="165" height="105" rx="16" fill="#3f7f6b"/><text x="82" y="61" text-anchor="middle" font-size="24" font-weight="700" fill="#fff">PPO</text><text x="205" y="43" font-size="17" font-weight="700" fill="#283f37">prompt + rollout</text><text x="205" y="72" font-size="14" fill="#607069">online policy sample</text><text x="520" y="43" font-size="17" font-weight="700" fill="#283f37">GAE advantage</text><text x="520" y="72" font-size="14" fill="#607069">critic + clipped ratio</text><text x="835" y="56" font-size="16" fill="#283f37">completion only</text><text x="1110" y="43" font-size="16" fill="#283f37">unstable critic</text><text x="1110" y="72" font-size="14" fill="#607069">large KL / reward hack</text></g>
    <g transform="translate(55 580)"><rect width="1370" height="105" rx="16" fill="#f4faf6"/><rect width="165" height="105" rx="16" fill="#5b6f92"/><text x="82" y="61" text-anchor="middle" font-size="24" font-weight="700" fill="#fff">GRPO</text><text x="205" y="43" font-size="17" font-weight="700" fill="#283f37">prompt + G rollouts</text><text x="205" y="72" font-size="14" fill="#607069">same prompt group</text><text x="520" y="43" font-size="17" font-weight="700" fill="#283f37">group-normalized reward</text><text x="520" y="72" font-size="14" fill="#607069">no separate critic</text><text x="835" y="56" font-size="16" fill="#283f37">all completions</text><text x="1110" y="43" font-size="16" fill="#283f37">zero reward variance</text><text x="1110" y="72" font-size="14" fill="#607069">group compute cost</text></g>
    <g transform="translate(55 705)"><rect width="1370" height="105" rx="16" fill="#f4faf6"/><rect width="165" height="105" rx="16" fill="#8b6f9c"/><text x="82" y="61" text-anchor="middle" font-size="23" font-weight="700" fill="#fff">Agent RL</text><text x="205" y="43" font-size="17" font-weight="700" fill="#283f37">multi-turn trajectory</text><text x="205" y="72" font-size="14" fill="#607069">tools + observations</text><text x="520" y="43" font-size="17" font-weight="700" fill="#283f37">delayed trajectory reward</text><text x="520" y="72" font-size="14" fill="#607069">format + tool + GT</text><text x="835" y="56" font-size="16" fill="#283f37">response trajectory</text><text x="1110" y="43" font-size="16" fill="#283f37">credit assignment</text><text x="1110" y="72" font-size="14" fill="#607069">excess tool calls</text></g>
  </g>
</svg>
